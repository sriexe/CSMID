name: CSMID Automated Cloud Pipeline

on:
  schedule:
    # Runs scraper twice daily at 00:00 and 12:00 UTC
    - cron: '0 0,12 * * *'
  workflow_dispatch:
    inputs:
      run_discovery:
        description: 'Run skin discovery to refresh tracked_items in Supabase?'
        type: boolean
        default: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
      NTFY_SERVER: ${{ secrets.NTFY_SERVER || 'https://ntfy.sh' }}
      SCRAPINGANT_API_KEY: ${{ secrets.SCRAPINGANT_API_KEY }}
      SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
      ZENROWS_API_KEY: ${{ secrets.ZENROWS_API_KEY }}
      SCRAPINGBEE_API_KEY: ${{ secrets.SCRAPINGBEE_API_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # ------------------------------------------------------------------
      # Optional / Scheduled Discovery Step
      # Runs on Sundays (UTC) OR when manually toggled in workflow_dispatch
      # ------------------------------------------------------------------
      - name: Run Skin Discovery (Weekly / Manual)
        if: github.event.inputs.run_discovery == 'true' || github.event.schedule == '0 0 * * 0'
        run: python -m src.main --mode discovery

      # ------------------------------------------------------------------
      # Standard Scraping & Analytics Pipeline (Runs every time)
      # ------------------------------------------------------------------
      - name: Run CSMID Pipeline (Scrape & Analytics)
        run: python -m src.main --mode all