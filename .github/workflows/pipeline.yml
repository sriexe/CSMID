name: CSMID Automated Cloud Pipeline

on:
  schedule:
    # Runs automatically twice a day (00:00 and 12:00 UTC)
    - cron: '0 0,12 * * *'
  # Allows you to click a button on GitHub to run it manually anytime
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
      NTFY_SERVER: ${{ secrets.NTFY_SERVER || 'https://ntfy.sh' }}
      SCRAPINGANT_API_KEY: ${{ secrets.SCRAPINGANT_API_KEY }}
      SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY || '' }}
      ZENROWS_API_KEY: ${{ secrets.ZENROWS_API_KEY || '' }}
      SCRAPINGBEE_API_KEY: ${{ secrets.SCRAPINGBEE_API_KEY || '' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Scraper Engine
        run: python -m src.main

      - name: Run Analytics Engine & Send Alerts
        run: python -m src.analytics